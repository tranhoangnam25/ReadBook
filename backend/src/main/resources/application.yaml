server:
  port: 8080

  tomcat:
    uri-encoding: UTF-8

spring:

  application:
    name: backend

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=ebook_store;encrypt=false;trustServerCertificate=true
    username: sa
    password: 1
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: false
    clean-disable: false
    clean-on-validation-error: true