server:
  port: 8080

  tomcat:
    uri-encoding: UTF-8

jwt:
  secret: 9f3c7a1e5b8d2c4f6a9e0b7d1c3f8a2e4b6c9d0f1a2b3c4d5e6f7a8b9c0d1e2
  expiration: 3600

gemini:
  api:
    key: ${GEMINI_API_KEY:}

app:
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    facebook:
      app-id: ${FACEBOOK_CLIENT_ID:}

groq:
  api:
    key: ${GROQ_API_KEY:}

r2:
  endpoint: ${R2_ENDPOINT:http://localhost:9000}
  public-url: ${R2_PUBLIC_URL:http://localhost:9000/${R2_BUCKET:ebook-store}}
  access-key: ${R2_ACCESS_KEY:change-me}
  secret-key: ${R2_SECRET_KEY:change-me}
  bucket: ${R2_BUCKET:ebook-store}
  region: ${R2_REGION:auto}

spring:

  config:
    import: "optional:file:.env[.properties]"

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  application:
    name: backend

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=ebook_store;encrypt=false;trustServerCertificate=true
    username: sa
    password: 123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: false


    clean-disabled: false
    clean-on-validation-error: true
